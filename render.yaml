databases:
  - name: roomivo-db
    databaseName: rental_platform
    user: roomivo_api
    plan: basic-256mb
    diskSizeGB: 10
    region: frankfurt

services:
  # ── Backend API ──────────────────────────────────────────────────────
  - type: web
    name: roomivo-backend-0jyi
    runtime: python
    region: frankfurt
    plan: starter
    branch: master
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "python -c 'from app.main import app; print(\"import ok\")'"
    startCommand: "./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: REDIS_URL
        sync: false
      - key: STORAGE_ENDPOINT
        value: "https://e9e4f279f640445e67f1070fea6e8c6c.r2.cloudflarestorage.com"
      - key: STORAGE_BUCKET
        value: "rental-platform-media"
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: CACHE_DIR
        value: "./.cache"
      - key: PYTHONPATH
        value: "."
      - key: ALLOWED_ORIGINS
        value: "https://roomivo.eu,https://www.roomivo.eu,https://api.roomivo.eu,https://roomivo-frontend-0jyi.onrender.com,http://localhost:3000"
      - key: COOKIE_DOMAIN
        value: ".roomivo.eu"
      - key: ENVIRONMENT
        value: "production"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        value: "https://roomivo.eu"
      - key: FROM_EMAIL
        value: "Roomivo <contact@roomivo.eu>"

      # SECRETS (sync: false → set manually in Render Dashboard)
      - key: DATABASE_URL
        fromDatabase:
          name: roomivo-db
          property: connectionString
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CREDENTIAL_SIGNING_KEY
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"

  # ── Frontend (Next.js standalone) ────────────────────────────────────
  - type: web
    name: roomivo-frontend-0jyi
    runtime: docker
    region: frankfurt
    plan: starter
    branch: master
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://roomivo-backend-0jyi.onrender.com"
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
    buildFilter:
      paths:
        - frontend/**

  # ── Celery Background Worker ─────────────────────────────────────────
  - type: worker
    name: roomivo-worker
    runtime: python
    region: frankfurt
    plan: starter
    branch: master
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 --without-gossip --without-mingle --without-heartbeat"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DATABASE_URL
        fromDatabase:
          name: roomivo-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: CREDENTIAL_SIGNING_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "Roomivo <contact@roomivo.eu>"
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHONPATH
        value: "."
      - key: STORAGE_ENDPOINT
        value: "https://e9e4f279f640445e67f1070fea6e8c6c.r2.cloudflarestorage.com"
      - key: STORAGE_BUCKET
        value: "rental-platform-media"
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
