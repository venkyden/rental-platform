name: Roomivo CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ── Canary ─────────────────────────────────────────────────────────────
  # Runs first on every push/PR. If any canary fails the system is broken
  # in a user-visible way — the full backend suite won't even start.
  canary:
    name: System Canary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roomivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d roomivo_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@127.0.0.1:5432/roomivo_test
      SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long-for-ci
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies (libdmtx)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdmtx-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run canary tests
        run: python -m pytest tests_integration/test_system_canary.py -v --tb=short -m canary

  # ── Backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    needs: [canary, secret-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roomivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d roomivo_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@127.0.0.1:5432/roomivo_test
      SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long-for-ci
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies (libdmtx)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdmtx-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit/mock tests
        run: >-
          python -m pytest
          tests/test_config.py tests/test_auth.py tests/test_properties.py
          tests/test_french_compliance.py tests/test_security_headers.py
          -v --tb=short

      - name: Build schema (migrations) for integration tests
        run: python -m alembic upgrade head

      - name: Run real-DB integration tests (IDOR / concurrency / cascade)
        run: python -m pytest tests_integration/ -v --tb=short

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    needs: [canary]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check & build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.roomivo.eu

  # ── Frontend E2E (real backend) ──────────────────────────────────────────
  # Runs the frontend (prod build) against a real FastAPI backend on :8000 so
  # both mocked and backend-dependent flows work. Prod build avoids dev-only
  # compile flakiness and console noise; the CSP allows the localhost http
  # backend (see next.config.ts httpApi).
  #
  # Gate (blocking) = specs verified green: verification/consent, smoke, landing,
  # auth modal, search. Extended (production_readiness, properties_wizard) runs
  # non-blocking — it still has ~10 genuine residual failures being triaged.
  e2e:
    name: Frontend E2E
    needs: [frontend]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roomivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d roomivo_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@127.0.0.1:5432/roomivo_test
      SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long-for-ci
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      # ── Backend on :8000 ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies (libdmtx)
        run: sudo apt-get update && sudo apt-get install -y libdmtx-dev

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Start backend (uvicorn :8000)
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health || (echo "backend failed to start" && cat /tmp/backend.log && exit 1)

      # ── Frontend (prod build) on :3001 ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build (real backend on :8000)
        working-directory: frontend
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000

      - name: Run E2E gate (blocking)
        working-directory: frontend
        run: >-
          npx playwright test
          e2e/verification_flows.spec.ts e2e/smoke.spec.ts e2e/landing.spec.ts
          e2e/auth_modal.spec.ts e2e/page2.spec.ts
          --config=playwright.ci.config.ts --project=chromium

      - name: Run E2E extended (non-blocking — residual triage)
        if: ${{ !cancelled() }}
        continue-on-error: true
        working-directory: frontend
        run: >-
          npx playwright test
          e2e/production_readiness.spec.ts e2e/properties_wizard.spec.ts
          --config=playwright.ci.config.ts --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
